model:
  name: MiniMax-M2.1
  model_type: minimax_m2

paths:
  checkpoint_dir: /home/mashun/vllm_project/checkpoints/MiniMax-M2.1-FP8
  output_dir: /home/mashun/vllm_project/checkpoints/MiniMax-M2.1-w4a8

runtime:
  num_workers: 16
  mode: dequant+quant # dequant | dequant+quant | quant (only support bf16)

quant:
  version: 2
  format: 
    TN:
      - "re:model.layers.\\d+.block_sparse_moe.experts.*"
    NN: ~
  batch_size: 64
  block_size: 128
  group_size: -1
  symmetric: True
  class:
    int4:
      - "re:model.layers.\\d+.block_sparse_moe.experts.*"
    int8: ~
  ignore: 
    - "model.embed_tokens.weight"
    - "re:model.layers.\\d+.input_layernorm.weight"
    - "re:model.layers.\\d+.self_attn.*"
    - "re:model.layers.\\d+.post_attention_layernorm.weight"
    - "re:model.layers.\\d+.block_sparse_moe.gate.weight"
    - "re:model.layers.\\d+.block_sparse_moe.e_score_correction_bias"
    - "model.norm.weight"
    - "lm_head.weight"

dequant:
  ignore:
    - "re:lm_head.*"
    - "re:model.embed_tokens.*"
    - "re:model.layers.\\d+.input_layernorm.*"
    - "re:model.layers.\\d+.mlp.gate.*"
    - "re:model.layers.\\d+.post_attention_layernorm.*"
    - "re:model.layers.\\d+.self_attn.k_norm.*"
    - "re:model.layers.\\d+.self_attn.q_norm.*"
    - "re:model.norm.*"
    - "re:model.layers.\\d+.block_sparse_moe.e_score_correction_bias"
    - "re:model.layers.\\d+.block_sparse_moe.gate.weight"