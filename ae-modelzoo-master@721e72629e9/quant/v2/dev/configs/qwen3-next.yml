model:
  name: Qwen3-Next-80B-A3B-Instruct
  model_type: qwen3_moe

paths:
  checkpoint_dir: /home/mashun/vllm_project/checkpoints/Qwen3-Next-80B-A3B-Instruct-FP8
  output_dir: /home/mashun/vllm_project/checkpoints/Qwen3-Next-80B-A3B-Instruct

runtime:
  num_workers: 16
  mode: dequant # dequant | dequant+quant | quant (only support bf16)

quant:
  version: 2
  format: 
    TN: ~
    NN: ~
  batch_size: 64
  block_size: 128
  group_size: -1
  symmetric: True
  class:
    int4: ~
    int8: ~
  ignore: ~

dequant:
  ignore: 
    - "re:.*linear_attn.in_proj_ba*"
    - "re:.*conv1d.*"
    - "re:.*A_log.*"
    - "re:.*shared_expert_gate.*"
    - "re:.*bias.*"
    - "re:.*norm.*"
    - "re:.*mlp.gate.*"
    - "re:.*embed_tokens.*"
    - "re:.*lm_head.*"